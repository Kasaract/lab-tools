name: lab-tools

services:
  - name: backend
    source_dir: /backend
    dockerfile_path: /backend/Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    github:
      repo: Kasaract/lab-tools
      branch: main
      deploy_on_push: true
    envs:
      - key: GMAIL_APP_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: FRONTEND_URL
        scope: RUN_TIME
        value: ${APP_URL}

static_sites:
  - name: frontend
    source_dir: /frontend
    build_command: npm run build
    output_dir: dist
    catchall_document: index.html
    github:
      repo: Kasaract/lab-tools
      branch: main
      deploy_on_push: true
    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        value: ${backend.PUBLIC_URL}
